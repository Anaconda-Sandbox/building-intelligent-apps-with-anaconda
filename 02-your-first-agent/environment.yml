name: first-agent
channels:
  - defaults
  - main-x  # New channel for pure wheels packages
  # self-hosted channels should go last to allow defaults and main-x to satisfy as many dependencies as possible
  # conda-pypi is the long-term solution for pip-only packages in conda environments, but it's still experimental as of Q1 2026.
  - conda-pypi
dependencies:
  - python=3.11

  # ── Package management and lock files  ────────────────────────────────────────
  #  Move from conda-lock to conda-lockfile in base environment 
  - conda-lockfile  #  Reproducible cross-platform lock files
  - pipdeptree
 
  # ── Jupyter ───────────────────────────────────────────────────────────────────
  # ipykernel registers this environment as a selectable Jupyter kernel.
  # jupyterlab is required to open the notebook.
  - ipykernel
  - jupyterlab
 
  # ── Data pipeline ─────────────────────────────────────────────────────────────
  # Same packages ingestion.py and agent_tools.py import.
  - numpy
  - polars
  - scikit-learn
  - pydantic>=2.0
 
  # ── Agent stack ───────────────────────────────────────────────────────────────
  - langchain-core
  - langchain-openai
  - langgraph

  # ── Utilities ─────────────────────────────────────────────────────────────────
  - python-dotenv   # used in setup patterns across the curriculum

    # Some packages are only on PyPI —
  # they move faster than conda-forge packaging can keep up.
  # Best practice is to treat them as fast moving, less secure dependencies.
  #
  # conda-pypi (experimental, Q1 2026) is the safer long-term answer:
  #   conda pypi install vllm openai
  # It converts wheels to .conda format and respects conda's solver.
  # Watch: https://conda.org/blog/conda-roadmap-q1-2026/