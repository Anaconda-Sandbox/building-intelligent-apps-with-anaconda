name: first-agent
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
 
  # ── Jupyter ───────────────────────────────────────────────────────────────────
  # ipykernel registers this environment as a selectable Jupyter kernel.
  # jupyterlab is required to open the notebook.
  - ipykernel
  - jupyterlab
 
  # ── Data pipeline ─────────────────────────────────────────────────────────────
  # Same packages ingestion.py and agent_tools.py import.
  - numpy
  - polars
  - scikit-learn
  - pydantic>=2.0
 
  # ── Agent stack ───────────────────────────────────────────────────────────────
  # All three are available on conda-forge — no pip section required.
  - langchain-core
  - langchain-openai
  - langgraph

  # ── Utilities ─────────────────────────────────────────────────────────────────
  - python-dotenv   # used in setup patterns across the curriculum