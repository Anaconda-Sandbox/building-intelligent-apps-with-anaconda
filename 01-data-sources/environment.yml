name: data-foundations
channels:
  - defaults
  - main-x  # New channel for pure wheels packages
  # self-hosted channels should go last to allow defaults and main-x to satisfy as many dependencies as possible
  # conda-pypi is the long-term solution for pip-only packages in conda environments, but it's still experimental as of Q1 2026.
  - conda-pypi
dependencies:
  # Core Python
  - python=3.11
  
  # ── Jupyter ───────────────────────────────────────────────────────────────────
  # ipykernel registers this environment as a selectable Jupyter kernel.
  # Without it, `jupyter lab` can't find the env and throws the ipykernel error.
  # jupyterlab is the interface; ipykernel is the bridge between it and Python.
  - ipykernel
  - jupyterlab

  # ── Data pipeline ─────────────────────────────────────────────────────────────
  # Everything the notebook and ingestion.py actually import.
  # polars        → load_lightcurve(), feature engineering
  # numpy         → IsolationForest features, rolling window arrays
  # matplotlib    → light curve and anomaly plots
  # scikit-learn  → IsolationForest anomaly detection
  # pydantic      → ValidationReport, LightcurveSchema
  - polars>=1.0
  - numpy>=1.26
  - matplotlib>=3.8
  - scikit-learn>=1.4
  - pydantic>=2.0

  # ── Utilities ─────────────────────────────────────────────────────────────────
  - python-dotenv   # used in setup patterns across the curriculum

  # Some packages are only on PyPI —
  # they move faster than conda-forge packaging can keep up.
  # Best practice is to treat them as fast moving, less secure dependencies.
  #
  # conda-pypi (experimental, Q1 2026) is the safer long-term answer:
  #   conda install anthropic openai
  # Installs them natively as wheels alongside conda packages 
  # (supporting pure Python wheels as a first class citizen/artifact in conda envs)
  # Learn more: https://conda.github.io/conda-pypi/quickstart/