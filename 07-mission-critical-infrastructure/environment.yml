name: mission-critical
channels:
  - conda-forge
  - conda-pypi
dependencies:
  # Core Python
  - python=3.11

  # ── Package management and lock files  ────────────────────────────────────────
  #  Move from conda-lock to conda-lockfile in base environment 
  - conda-lockfile  # Reproducible cross-platform lock files
  - pipdeptree
  - conda-pack>=0.7  # portable environment tarballs for air-gap deployment
  
  # ── Orchestration ─────────────────────────────────────────────────────────────
  - metaflow>=2.18

  # ── Data pipeline ─────────────────────────────────────────────────────────────
  - pydantic>=2.0

  # Some packages are only on PyPI —
  # they move faster than conda-forge packaging can keep up.
  # Best practice is to treat them as fast moving, less secure dependencies.
  #
  # conda-pypi (experimental, Q1 2026) is the safer long-term answer:
  #   conda pypi install vllm openai
  # It converts wheels to .conda format and respects conda's solver.
  # Watch: https://conda.org/blog/conda-roadmap-q1-2026/