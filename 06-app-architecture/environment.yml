name: app-architecture
channels:
  - conda-forge
  - conda-pypi
dependencies:
  # Core Python
  - python=3.11

  # ── Package management and lock files  ────────────────────────────────────────
  # Move from conda-lock to conda-lockfile in base environment 
  - pipdeptree

  # ── Jupyter ───────────────────────────────────────────────────────────────────
  - ipykernel
  - jupyterlab

  # ── Data pipeline ─────────────────────────────────────────────────────────────
  - polars>=1.0
  - numpy>=1.26
  - scikit-learn>=1.4
  - pydantic>=2.0
  - pyarrow>=14.0

  # ── Orchestration + evaluation ────────────────────────────────────────────────
  - metaflow>=2.18
  - pytest>=8.0           # run evals/assertions.py as tests: pytest evals/

  # ── Agent memory ──────────────────────────────────────────────────────────────
  - duckdb>=0.10          # embedded vector store — no server, single portable file

  # ── Inference stack ───────────────────────────────────────────────────────────
  # All confirmed on conda-forge — no pip section required
  - anthropic             # primary — Claude Haiku default
  - openai>=1.30          # OpenAI-compatible client for AI Navigator / vLLM
  - langchain-core        # LangChain abstractions used by analysis_agent.py
  - langchain-openai      # ChatOpenAI used in _build_agent()
  - langchain-anthropic   # ChatAnthropic used in _build_agent() when ANTHROPIC_API_KEY set
  - langgraph             # MemorySaver checkpointer + create_react_agent

  # ── Utilities ─────────────────────────────────────────────────────────────────
  - python-dotenv   # used in setup patterns across the curriculum

  # Some packages are only on PyPI —
  # they move faster than conda-forge packaging can keep up.
  # Best practice is to treat them as fast moving, less secure dependencies.
  #
  # conda-pypi (experimental, Q1 2026) is the safer long-term answer:
  #   conda install anthropic openai
  # Installs them natively as wheels alongside conda packages 
  # (supporting pure Python wheels as a first class citizen/artifact in conda envs)
  # Learn more: https://conda.github.io/conda-pypi/quickstart/