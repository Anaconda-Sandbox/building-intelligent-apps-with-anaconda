name: foundation
channels: 
  - defaults
  - main-x  # New channel for pure wheels packages
  # self-hosted channels should go last to allow defaults and main-x to satisfy as many dependencies as possible
  # conda-pypi is the long-term solution for pip-only packages in conda environments, but it's still experimental as of Q1 2026.
  - conda-pypi
dependencies:
  # Core Python
  - python=3.11

  # Package management and lock files
  - pipdeptree

  # Development and utilities
  - pip
  - pytest>=7.0
  - packaging
  - unearth

  # HTTP/2 and networking (for conda-pypi operations)
  - h2
  - httpx
  - hishel

  # Data handling
  - msgpack-python
  - typing-extensions
  # - ipykernel

  # Database support
  - anysqlite
  - pgvector

  # LLM & AI Frameworks
  - langchain
  - llama-index
  - pydantic>=2.0

  # MCP (Model Context Protocol)
  - mcp
  - fastmcp

  # Agent & Workflow Frameworks
  - langgraph

  # Async & HTTP utilities
  - aiohttp
  - python-dotenv
