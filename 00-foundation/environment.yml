name: foundation
channels:
  - conda-forge
  - defaults
  # - main-x  # New channel for pure wheels packages
  - conda-pypi
dependencies:
  # Core Python
  - python=3.11

  # Package management and lock files
  - conda-lock # Old version of environment lock, now moving to conda-lockfile in base environment
  - conda-lockfile
  - pipdeptree

  # Jupyter notebook support
  - ipykernel

  # ── Utilities ─────────────────────────────────────────────────────────────────
  - python-dotenv   # used in setup patterns across the curriculum

