name: foundation
channels:
  - main
  # - main-x  # New channel for pure wheels packages
  # - community  # New channel for community-maintained packages
  - conda-forge
# platforms: # TODO: Fix - this is incorrect syntax
#   - linux-64
#   - osx-arm64
dependencies:
  # Core Python
  - python>=3.10

  # conda-pypi ecosystem
  - conda-pypi>=0.8.0
  - conda-rattler-solver  # Required for wheel installation with conda-pypi

  # Package management and lock files
  - conda-lock
  - pipdeptree
  # - anaconda-cli

  # Development and utilities
  - pip
  - pytest>=7.0
  - packaging
  - unearth

  # HTTP/2 and networking (for conda-pypi operations)
  - h2
  - httpx
  - hishel

  # Data handling
  - msgpack-python
  - typing-extensions

  # Database support
  - anysqlite
  - pgvector

  # LLM & AI Frameworks
  - langchain
  - llama-index
  - pydantic>=2.0

  # MCP (Model Context Protocol)
  - mcp
  - fastmcp

  # Agent & Workflow Frameworks
  - langgraph

  # Async & HTTP utilities
  - aiohttp
  - python-dotenv

  # Panel App
  - panel
  - panel-material-ui
